<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DLM Viewer</title>
  <meta name="theme-color" content="#07070E">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/viewer.css">
</head>
<body>

<div class="viewer-app">

  <!-- ═══ NAV ═══ -->
  <nav class="viewer-nav">
    <a href="index.html" class="nav-logo">
      <span class="logo-mark">DLM</span>
    </a>
    <div class="ed-breadcrumb" style="display:flex;align-items:center;gap:6px;color:var(--text-mid);font-size:13px">
      <span style="color:var(--text-dim)">›</span>
      <span data-i18n="vw_title">DLM Viewer</span>
    </div>
    <div style="flex:1"></div>
    <div class="lang-toggle">
      <button data-lang="en" onclick="setLang('en')">EN</button>
      <button data-lang="pt" onclick="setLang('pt')">PT</button>
    </div>
    <a href="editor.html" class="btn btn-ghost btn-sm nav-cta" style="margin-left:8px" data-i18n="vw_edit">Edit in Editor</a>
  </nav>

  <!-- ═══ OPEN STATE ═══ -->
  <div class="viewer-open-state" id="openState">
    <div class="viewer-bg">
      <div class="viewer-orb viewer-orb-1"></div>
      <div class="viewer-orb viewer-orb-2"></div>
    </div>
    <div class="open-card" id="openCard">
      <div class="open-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <path d="M30 15V28a2 2 0 01-2 2H8a2 2 0 01-2-2V8a2 2 0 012-2h13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M22 4h8v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 21l13-13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="13" cy="14" r="3" stroke="currentColor" stroke-width="1.3"/>
          <path d="M8 26l5-5 3 3 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h2 data-i18n="vw_open_h">Open a .dlm file</h2>
      <p data-i18n="vw_open_sub">Drag & drop or click to open a Dynamic Layered Media file.</p>
      <button class="btn btn-primary" id="openBtn" data-i18n="vw_open_btn">Choose .dlm file</button>
      <div class="open-example-sep"><span data-i18n="vw_or">or</span></div>
      <button class="btn btn-ghost" id="exampleBtn" data-i18n="vw_try_example">Try an example</button>
    </div>
  </div>

  <!-- ═══ VIEW STATE ═══ -->
  <div class="viewer-view-state" id="viewState">

    <!-- Stage -->
    <div class="viewer-stage" id="viewerStage">
      <div class="vw-photo-wrap" id="photoWrap">
        <img id="vwPhoto" class="vw-photo" alt="" draggable="false">
        <div class="vw-hotspot-layer" id="hotspotLayer"></div>
      </div>
    </div>

    <!-- Bottom bar -->
    <div class="viewer-bar">
      <div class="vw-file-info">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M9.5 1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V6.5L9.5 1z" stroke="var(--a1)" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9.5 1v5.5H15" stroke="var(--a1)" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span class="vw-filename" id="vwFilename">—<span class="ext">.dlm</span></span>
        <span class="vw-count" id="vwCount">0 pins</span>
      </div>
      <div class="vw-hint">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M7 6.5V10M7 4.5v.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        <span data-i18n="vw_tap_hint">Tap the glowing points to hear the sounds</span>
      </div>
      <div class="vw-actions">
        <button class="btn btn-ghost btn-sm" id="backBtn" data-i18n="vw_back">Open another file</button>
        <a href="editor.html" class="btn btn-secondary btn-sm" data-i18n="vw_edit">Edit in Editor</a>
      </div>
    </div>
  </div>

</div>

<!-- Now playing strip -->
<div class="vw-now-playing" id="nowPlaying">
  <div class="np-wave">
    <span></span><span></span><span></span><span></span>
  </div>
  <span class="np-np-label" data-i18n="vw_playing">Playing</span>
  <span class="np-title" id="npTitle">—</span>
</div>

<!-- Footer -->
<footer style="position:relative;z-index:1">
  <a href="index.html" class="footer-brand">Dynamic Layered Media</a>
  <div class="footer-creator">
    <span class="footer-copy">Created by</span>
    <a href="https://instagram.com/dalmodaniel_" target="_blank" rel="noopener" class="footer-ig">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
      @dalmodaniel_
    </a>
  </div>
  <span class="footer-copy">© 2026 DLM.</span>
</footer>

<!-- Hidden input -->
<input type="file" id="dlmInput" accept=".dlm,application/octet-stream,application/json" style="display:none">

<script src="js/i18n.js"></script>
<script src="js/viewer.js"></script>
</body>
</html>
